<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Nutricional</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; line-height: 1.6; }
        #contenedor-calculadora { border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
        .error { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Calculadora Nutricional</h1>
    <div id="contenedor-calculadora">
        <p>Cargando recetas y estilos...</p>
    </div>

    <script>
        async function cargarCalculadora() {
            const contenedor = document.getElementById("contenedor-calculadora");
            try {
                // 1. Cargar archivos XML y XSLT
                const [xmlResponse, xslResponse] = await Promise.all([
                    fetch('recetas.xml'),
                    fetch('estilo.xsl')
                ]);

                if (!xmlResponse.ok || !xslResponse.ok) throw new Error("No se pudo cargar recetas.xml o estilo.xsl");

                const xmlText = await xmlResponse.text();
                const xslText = await xslResponse.text();

                // 2. Parsear los textos a objetos DOM
                const parser = new DOMParser();
                const xml = parser.parseFromString(xmlText, "application/xml");
                const xsl = parser.parseFromString(xslText, "application/xml");

                // 3. Realizar la transformación XSLT
                if (window.XSLTProcessor) {
                    const xsltProcessor = new XSLTProcessor();
                    xsltProcessor.importStylesheet(xsl);
                    const resultDocument = xsltProcessor.transformToFragment(xml, document);
                    
                    contenedor.innerHTML = ""; // Limpiar mensaje de carga
                    contenedor.appendChild(resultDocument);
                } else {
                    throw new Error("Tu navegador no soporta transformaciones XSLT.");
                }
            } catch (error) {
                contenedor.innerHTML = `<p class="error">Error: ${error.message}. Asegúrate de que los archivos recetas.xml y estilo.xsl estén en la raíz.</p>`;
                console.error(error);
            }
        }

        // Iniciar la carga al abrir la página
        window.onload = cargarCalculadora;
    </script>
</body>
</html>
