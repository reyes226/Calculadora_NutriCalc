<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #visor-xml { border: 1px solid #eee; padding: 20px; border-radius: 10px; }
        .error { color: red; background: #fee; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="visor-xml">Cargando recetas...</div>

    <script>
        async function mostrarCalculadora() {
            const visor = document.getElementById("visor-xml");
            try {
                // 1. Descargar archivos
                const [xmlRes, xslRes] = await Promise.all([
                    fetch('recetas.xml'),
                    fetch('estilo.xsl')
                ]);

                if (!xmlRes.ok || !xslRes.ok) throw new Error("No se encontraron los archivos XML o XSLT.");

                const xmlText = await xmlRes.text();
                const xslText = await xslRes.text();

                // 2. Convertir a objetos DOM
                const parser = new DOMParser();
                const xml = parser.parseFromString(xmlText, "application/xml");
                const xsl = parser.parseFromString(xslText, "application/xml");

                // 3. Transformar XML usando el XSLT
                const xsltProcessor = new XSLTProcessor();
                xsltProcessor.importStylesheet(xsl);
                const resultadoFragmento = xsltProcessor.transformToFragment(xml, document);

                // 4. Inyectar en la página
                visor.innerHTML = ""; 
                visor.appendChild(resultadoFragmento);

            } catch (err) {
                visor.innerHTML = `<div class="error">
                    <b>Error al cargar:</b> ${err.message}<br>
                    Asegúrate de que 'recetas.xml' y 'estilo.xsl' estén en la misma carpeta.
                </div>`;
            }
        }

        window.onload = mostrarCalculadora;
    </script>
</body>
</html>
